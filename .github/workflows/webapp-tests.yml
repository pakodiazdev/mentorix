name: Webapp Tests

on:
  pull_request:
    paths:
      - 'code/webapp/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/webapp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: code/webapp/package-lock.json

      - run: npm ci
      - run: npm run test:cov
