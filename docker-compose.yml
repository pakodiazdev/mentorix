services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      target: dev
    container_name: mentorix_api
    working_dir: /app/code/api
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./code/api:/app/code/api
      - api_node_modules:/app/code/api/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGO_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-admin}@mongo:27017/${MONGO_DB:-mentorix}?authSource=admin
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_change_in_production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-your_jwt_refresh_secret_change_in_production}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-3600}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  webapp:
    build:
      context: .
      dockerfile: docker/webapp/Dockerfile
      target: dev
    container_name: mentorix_webapp
    working_dir: /app/code/webapp
    ports:
      - "${VITE_PORT:-5174}:5173"
    volumes:
      - ./code/webapp:/app/code/webapp
      - webapp_node_modules:/app/code/webapp/node_modules
    environment:
      - VITE_API_URL=http://localhost:${API_PORT:-3000}/api/v1
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: mentorix_nginx
    ports:
      - "${NGINX_HTTP_PORT:-8880}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "http://127.0.0.1/", "-o", "/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  mongo:
    image: mongo:7
    container_name: mentorix_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-mentorix}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/init-db.js:/docker-entrypoint-initdb.d/init-db.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:1
    container_name: mentorix_mongo_express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-admin}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-admin}@mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
  api_node_modules:
  webapp_node_modules:
